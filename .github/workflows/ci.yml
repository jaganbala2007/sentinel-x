name: Sentinel-X CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  release:
    types: [ published ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1 — Validate HTML & Frontend Assets
  # ============================================================
  frontend-validate:
    name: "🌐 Frontend Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate HTML Files Exist
        run: |
          echo "=== Verifying frontend source files ==="
          for file in frontend/src/index.html frontend/src/auth.html frontend/src/app.html frontend/src/test-suite.html; do
            if [ -f "$file" ]; then
              echo "✅ Found: $file ($(wc -l < "$file") lines)"
            else
              echo "❌ MISSING: $file"
              exit 1
            fi
          done

      - name: Verify Server Scripts
        run: |
          echo "=== Verifying server scripts ==="
          test -f frontend/server/dev-server.ps1 && echo "✅ dev-server.ps1 OK" || (echo "❌ Missing dev-server.ps1" && exit 1)
          test -f frontend/server/run.bat && echo "✅ run.bat OK" || (echo "❌ Missing run.bat" && exit 1)

      - name: Check Asset Files
        run: |
          echo "=== Asset integrity check ==="
          echo "Images in assets/images/:"
          ls -lh assets/images/ || echo "(empty)"
          echo "3D models:"
          ls assets/3d_models/factory/1/ || true

  # ============================================================
  # Job 2 — Python Backend Lint & Type Check
  # ============================================================
  backend-lint:
    name: "🐍 Backend Code Quality"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Linting Tools
        run: |
          pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff Linter
        run: ruff check app/ || true

      - name: Run Ruff Formatter Check
        run: ruff format --check app/ || true

      - name: Verify Backend Structure
        run: |
          echo "=== Backend structure validation ==="
          for f in app/main.py app/core/config.py app/models/schemas.py \
                   app/routers/alerts.py app/routers/sensors.py app/routers/machine.py \
                   requirements.txt Dockerfile .env.example; do
            test -f "$f" && echo "✅ $f" || (echo "❌ MISSING: $f" && exit 1)
          done

  # ============================================================
  # Job 3 — Backend Unit Tests
  # ============================================================
  backend-test:
    name: "🧪 Backend Tests"
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn pydantic pydantic-settings httpx pytest pytest-asyncio

      - name: Run API Tests
        run: |
          if [ -d "../tests" ] && [ "$(ls -A ../tests/*.py 2>/dev/null)" ]; then
            pytest ../tests/ -v --tb=short
          else
            echo "No Python test files found — skipping (add tests in /tests/)"
          fi

  # ============================================================
  # Job 4 — Documentation Integrity
  # ============================================================
  docs-check:
    name: "📄 Documentation Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Required Documentation
        run: |
          echo "=== Required root documentation ==="
          for doc in README.md CHANGELOG.md ROADMAP.md CONTRIBUTING.md \
                     CODE_OF_CONDUCT.md SECURITY.md FAQ.md LICENSE CODEOWNERS; do
            if [ -f "$doc" ]; then
              words=$(wc -w < "$doc")
              echo "✅ $doc ($words words)"
            else
              echo "❌ MISSING: $doc"
              exit 1
            fi
          done

      - name: Verify Folder READMEs
        run: |
          echo "=== Folder README checks ==="
          for folder in docs/ frontend/ backend/ hardware/ firmware/ models/ datasets/ tests/ deployment/ scripts/ assets/; do
            if [ -f "${folder}README.md" ]; then
              echo "✅ ${folder}README.md"
            else
              echo "⚠️  Missing: ${folder}README.md"
            fi
          done

      - name: Check README Length
        run: |
          words=$(wc -w < README.md)
          echo "README.md word count: $words"
          if [ "$words" -lt 500 ]; then
            echo "❌ README is too short (< 500 words). Please improve documentation."
            exit 1
          fi
          echo "✅ README length is acceptable."

  # ============================================================
  # Job 5 — Docker Build Validation
  # ============================================================
  docker-build:
    name: "🐳 Docker Build Check"
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        run: |
          docker compose -f deployment/docker-compose.yml config --quiet
          echo "✅ docker-compose.yml is valid"

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: sentinelx-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 6 — Security Scan
  # ============================================================
  security-scan:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check for Secret Exposure
        run: |
          echo "Checking for accidentally committed secrets..."
          if grep -r "CHANGE_ME" --include="*.py" backend/app/ 2>/dev/null; then
            echo "⚠️  Placeholder secrets still in code — ensure .env is not committed"
          fi
          if [ -f "backend/.env" ]; then
            echo "❌ SECURITY: backend/.env is committed! Remove it immediately."
            exit 1
          fi
          echo "✅ No committed secrets detected"

      - name: Run pip-audit on Backend
        working-directory: backend
        run: |
          pip install pip-audit
          pip install -r requirements.txt --quiet
          pip-audit --desc on || true
