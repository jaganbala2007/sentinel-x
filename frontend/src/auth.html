<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL-X | Authentication Gate</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#030712',
                            dark: '#0B0F19',
                            blue: '#0F52BA',
                            neonBlue: '#3B82F6',
                            neonGreen: '#10B981',
                            neonRed: '#EF4444',
                            orange: '#F59E0B',
                            glass: 'rgba(15, 23, 42, 0.6)'
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts & Lucide Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #030712;
            background-image: radial-gradient(circle at top right, rgba(30, 58, 138, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(8, 145, 178, 0.1), transparent 40%);
            color: #F3F4F6;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(11, 15, 25, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
        }
        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        .laser-scan::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(59, 130, 246, 0.6);
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.8);
            animation: scan 4s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 select-none">

    <!-- Auth Frame Container -->
    <div class="w-full max-w-lg relative">
        <!-- Background Glowing Circles -->
        <div class="absolute -top-12 -left-12 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-12 -right-12 w-48 h-48 bg-cyan-500/10 rounded-full blur-3xl"></div>

        <!-- card -->
        <div class="glass-card rounded-2xl p-8 border border-white/10 relative overflow-hidden laser-scan shadow-2xl">
            
            <!-- Card Header -->
            <div class="text-center space-y-3 pb-6 border-b border-white/5">
                <div class="inline-flex w-12 h-12 rounded-xl bg-gradient-to-tr from-blue-700 to-cyan-500 items-center justify-center border border-white/10 shadow-lg shadow-blue-500/20">
                    <i data-lucide="shield-alert" class="w-6 h-6 text-white"></i>
                </div>
                <h2 class="text-2xl font-extrabold tracking-wider text-white">SENTINEL-X SECURITY GATE</h2>
                <p class="text-xs uppercase tracking-widest text-cyan-400 font-bold">Cognitive Authentication Protocols</p>
            </div>

            <!-- Login View -->
            <div id="login-view" class="pt-6 space-y-6">
                <!-- Role Selector -->
                <div class="space-y-2">
                    <label class="text-xs uppercase tracking-wider font-bold text-slate-400">Select Security Profile Role</label>
                    <div class="grid grid-cols-2 gap-3" id="role-selector">
                        <button onclick="selectRole('Admin', 'admin@sentinel.x', '094821')" class="role-btn px-4 py-3 rounded-xl border border-white/5 bg-white/5 text-slate-300 hover:border-blue-500/30 hover:bg-blue-500/5 hover:text-white transition-all text-xs font-semibold flex items-center gap-2">
                            <i data-lucide="user-cog" class="w-4 h-4 text-blue-400"></i>
                            <span>Admin</span>
                        </button>
                        <button onclick="selectRole('Supervisor', 'supervisor@sentinel.x', '384912')" class="role-btn px-4 py-3 rounded-xl border border-white/5 bg-white/5 text-slate-300 hover:border-blue-500/30 hover:bg-blue-500/5 hover:text-white transition-all text-xs font-semibold flex items-center gap-2">
                            <i data-lucide="users" class="w-4 h-4 text-cyan-400"></i>
                            <span>Supervisor</span>
                        </button>
                        <button onclick="selectRole('Safety Officer', 'officer@sentinel.x', '849127')" class="role-btn px-4 py-3 rounded-xl border border-white/5 bg-white/5 text-slate-300 hover:border-blue-500/30 hover:bg-blue-500/5 hover:text-white transition-all text-xs font-semibold flex items-center gap-2">
                            <i data-lucide="shield-check" class="w-4 h-4 text-emerald-400"></i>
                            <span>Safety Officer</span>
                        </button>
                        <button onclick="selectRole('Worker', 'worker@sentinel.x', '201948')" class="role-btn px-4 py-3 rounded-xl border border-white/5 bg-white/5 text-slate-300 hover:border-blue-500/30 hover:bg-blue-500/5 hover:text-white transition-all text-xs font-semibold flex items-center gap-2">
                            <i data-lucide="hard-hat" class="w-4 h-4 text-orange-400"></i>
                            <span>Worker</span>
                        </button>
                    </div>
                </div>

                <!-- Input fields -->
                <form id="credentials-form" onsubmit="handleLoginSubmit(event)" class="space-y-4">
                    <div class="space-y-2">
                        <label for="email" class="text-xs uppercase tracking-wider font-bold text-slate-400">Security Email Address</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500">
                                <i data-lucide="mail" class="w-4.5 h-4.5"></i>
                            </span>
                            <input type="email" id="email" required placeholder="name@sentinel.x" class="w-full bg-brand-black/40 border border-white/10 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition-all font-mono">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label for="password" class="text-xs uppercase tracking-wider font-bold text-slate-400">Security Authorization Key</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500">
                                <i data-lucide="key-round" class="w-4.5 h-4.5"></i>
                            </span>
                            <input type="password" id="password" required placeholder="••••••••••••" value="demo-access-2026" class="w-full bg-brand-black/40 border border-white/10 rounded-xl py-3.5 pl-11 pr-4 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition-all font-mono">
                        </div>
                    </div>

                    <button type="submit" class="w-full py-4 rounded-xl text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 transition-all duration-300 hover:shadow-lg hover:shadow-blue-500/20 border border-white/10 flex items-center justify-center gap-2">
                        <i data-lucide="log-in" class="w-4.5 h-4.5"></i>
                        <span>Initiate Secure Authentication</span>
                    </button>
                </form>
            </div>

            <!-- OTP Verification View -->
            <div id="otp-view" class="pt-6 space-y-6 hidden">
                <div class="text-center space-y-2 bg-blue-500/5 border border-blue-500/10 rounded-xl p-4">
                    <p class="text-sm text-slate-300 leading-normal">
                        Security Token sent to <span id="sent-email" class="font-mono text-cyan-400">email</span>
                    </p>
                    <p class="text-xs text-slate-400 font-mono">
                        Enter Code: <span id="hint-code" class="font-bold text-emerald-400">000000</span> (Pre-Filled)
                    </p>
                </div>

                <div class="space-y-4">
                    <!-- OTP Boxes -->
                    <div class="flex justify-between gap-2 max-w-xs mx-auto" id="otp-inputs">
                        <input type="text" maxlength="1" oninput="moveNext(this, 1)" class="otp-box w-12 h-12 bg-brand-black/40 border border-white/10 rounded-xl text-center text-xl font-bold font-mono text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30">
                        <input type="text" maxlength="1" oninput="moveNext(this, 2)" class="otp-box w-12 h-12 bg-brand-black/40 border border-white/10 rounded-xl text-center text-xl font-bold font-mono text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30">
                        <input type="text" maxlength="1" oninput="moveNext(this, 3)" class="otp-box w-12 h-12 bg-brand-black/40 border border-white/10 rounded-xl text-center text-xl font-bold font-mono text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30">
                        <input type="text" maxlength="1" oninput="moveNext(this, 4)" class="otp-box w-12 h-12 bg-brand-black/40 border border-white/10 rounded-xl text-center text-xl font-bold font-mono text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30">
                        <input type="text" maxlength="1" oninput="moveNext(this, 5)" class="otp-box w-12 h-12 bg-brand-black/40 border border-white/10 rounded-xl text-center text-xl font-bold font-mono text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30">
                        <input type="text" maxlength="1" oninput="moveNext(this, 6)" class="otp-box w-12 h-12 bg-brand-black/40 border border-white/10 rounded-xl text-center text-xl font-bold font-mono text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30">
                    </div>

                    <button onclick="verifyOtp()" class="w-full py-4 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 transition-all duration-300 hover:shadow-lg hover:shadow-blue-500/20 border border-white/10 flex items-center justify-center gap-2">
                        <i data-lucide="shield-check" class="w-4.5 h-4.5"></i>
                        <span>Verify Security Token</span>
                    </button>

                    <div class="flex items-center justify-between text-xs text-slate-400 px-2 font-mono">
                        <div class="flex items-center gap-1.5">
                            <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                            <span>Resend in <span id="timer" class="font-bold text-blue-400">60</span>s</span>
                        </div>
                        <button onclick="resendOtp()" id="resend-btn" disabled class="text-slate-500 hover:text-blue-400 transition-colors disabled:cursor-not-allowed">Resend OTP</button>
                    </div>
                </div>
            </div>

            <!-- Loading Spinner view -->
            <div id="loading-view" class="pt-12 pb-6 space-y-6 text-center hidden">
                <div class="w-16 h-16 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin mx-auto"></div>
                <div class="space-y-1">
                    <div class="text-sm font-bold text-white uppercase tracking-wider" id="loading-text">Synchronizing Cognitive State</div>
                    <p class="text-xs text-slate-400 font-mono">Connecting to local Fog server on port 8000...</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        let currentRole = "";
        let currentOtp = "";
        let timerVal = 60;
        let countdownTimer;

        // Auto select Admin on launch
        window.addEventListener('DOMContentLoaded', () => {
            selectRole('Admin', 'admin@sentinel.x', '094821');
        });

        // Handle Role selection
        function selectRole(role, email, mockOtp) {
            currentRole = role;
            currentOtp = mockOtp;
            
            // Highlight button
            const buttons = document.querySelectorAll('.role-btn');
            buttons.forEach(btn => {
                const text = btn.innerText;
                if (text.includes(role)) {
                    btn.classList.add('border-blue-500/70', 'bg-blue-500/10', 'text-white');
                    btn.classList.remove('border-white/5', 'bg-white/5', 'text-slate-300');
                } else {
                    btn.classList.remove('border-blue-500/70', 'bg-blue-500/10', 'text-white');
                    btn.classList.add('border-white/5', 'bg-white/5', 'text-slate-300');
                }
            });

            // Prefill email
            document.getElementById('email').value = email;
        }

        // Handle Credentials Submit
        function handleLoginSubmit(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;

            // Trigger Loading screen
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('loading-view').classList.remove('hidden');
            document.getElementById('loading-text').innerText = "Initiating Security Handshake";

            setTimeout(() => {
                // Render OTP screen
                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('otp-view').classList.remove('hidden');
                document.getElementById('sent-email').innerText = email;
                document.getElementById('hint-code').innerText = currentOtp;
                
                // Pre-fill OTP boxes for easy demo login
                const boxes = document.querySelectorAll('.otp-box');
                const otpStr = String(currentOtp);
                for(let i=0; i<6; i++) {
                    boxes[i].value = otpStr[i];
                }
                
                startTimer();
            }, 1200);
        }

        // OTP inputs auto-focus
        function moveNext(input, index) {
            if (input.value.length === 1 && index < 6) {
                const nextInput = document.getElementById('otp-inputs').children[index];
                nextInput.focus();
            }
        }

        // Start Countdown Timer
        function startTimer() {
            timerVal = 60;
            document.getElementById('timer').innerText = timerVal;
            document.getElementById('resend-btn').disabled = true;
            document.getElementById('resend-btn').classList.remove('text-blue-400');
            document.getElementById('resend-btn').classList.add('text-slate-500');

            clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                timerVal--;
                document.getElementById('timer').innerText = timerVal;
                if (timerVal <= 0) {
                    clearInterval(countdownTimer);
                    document.getElementById('resend-btn').disabled = false;
                    document.getElementById('resend-btn').classList.add('text-blue-400');
                    document.getElementById('resend-btn').classList.remove('text-slate-500');
                }
            }, 1000);
        }

        // Resend OTP
        function resendOtp() {
            startTimer();
        }

        // Verify OTP
        function verifyOtp() {
            const boxes = document.querySelectorAll('.otp-box');
            let code = "";
            boxes.forEach(box => { code += box.value; });

            if (code === currentOtp || code === "942861" || code.length === 6) {
                // Success
                document.getElementById('otp-view').classList.add('hidden');
                document.getElementById('loading-view').classList.remove('hidden');
                document.getElementById('loading-text').innerText = "Verifying Safety Key & DNA Profile";

                setTimeout(() => {
                    // Save session details
                    sessionStorage.setItem("userRole", currentRole);
                    sessionStorage.setItem("userEmail", document.getElementById('email').value);
                    sessionStorage.setItem("userName", currentRole + " User");
                    
                    window.location.href = "app.html";
                }, 1000);
            } else {
                alert("Security Authorization Code Mismatch. Please check the prefilled code.");
            }
        }
    </script>
</body>
</html>
